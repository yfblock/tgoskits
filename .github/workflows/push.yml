name: Push to Subrepos

# ═══════════════════════════════════════════════════════════════════════════════
# 使用说明 / Usage Guide
# ═══════════════════════════════════════════════════════════════════════════════
#
# 此工作流使用 scripts/repo/repo.py 将主仓库中修改的组件推送到子仓库。
# 默认分支映射规则：
# - tgoskits/main -> arceos-org/* 的 release 分支
# - tgoskits/main -> 非 arceos-org/* 的 main 分支
# - tgoskits/dev  -> 所有组件仓库的 dev 分支
#
# 【触发方式】
# ─────────────────────────────────────────────────────────────────────────────
# - 自动触发：推送到 main/dev 分支时自动检测变更并推送
# - 手动触发：Actions → Push to Subrepos → Run workflow
#
# 【手动触发参数】
# ─────────────────────────────────────────────────────────────────────────────
# - components: 指定组件（逗号分隔，留空自动检测）
# - branch: 手动覆盖推送到子仓库的目标分支（留空则按规则自动映射）
# - push_all: 推送所有组件（忽略变更检测）
# - force_push: 强制推送到子仓库（传递 repo.py push --force）
#
# 【权限配置】
# ─────────────────────────────────────────────────────────────────────────────
# 需要配置 Personal Access Token (PAT) 以推送到子仓库：
#
#   1. 创建 PAT：https://github.com/settings/tokens/new
#      - 名称：tgoskits-subtree-push
#      - 权限：repo (Full control of private repositories)
#      - 过期时间：根据需要设置
#
#   2. 添加到仓库 Secrets：
#      仓库 → Settings → Secrets and variables → Actions → New repository secret
#      - Name: SUBTREE_PUSH_TOKEN
#      - Value: 粘贴刚才创建的 PAT
#
# ═══════════════════════════════════════════════════════════════════════════════

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      components:
        description: '指定要推送的组件（逗号分隔，留空表示自动检测）'
        required: false
        type: string
        default: ''
      branch:
        description: '推送到子仓库的目标分支（留空则按规则自动映射）'
        required: false
        type: string
        default: ''
      push_all:
        description: '推送所有组件（忽略变更检测）'
        required: false
        type: boolean
        default: false
      force_push:
        description: '强制推送到子仓库'
        required: false
        type: boolean
        default: false

jobs:
  push-to-subrepos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.SUBTREE_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Detect changed components
        id: detect
        env:
          INPUT_PUSH_ALL: ${{ inputs.push_all }}
          INPUT_COMPONENTS: ${{ inputs.components }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_EVENT_BEFORE: ${{ github.event.before }}
          GH_SHA: ${{ github.sha }}
        run: |
          # 如果手动指定推送所有组件
          if [ "$INPUT_PUSH_ALL" = "true" ]; then
            echo "components=__all__" >> $GITHUB_OUTPUT
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "Pushing all components"
            exit 0
          fi
          
          # 如果手动指定了组件列表
          if [ -n "$INPUT_COMPONENTS" ]; then
            echo "components=$INPUT_COMPONENTS" >> $GITHUB_OUTPUT
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "Using manually specified components: $INPUT_COMPONENTS"
            exit 0
          fi
          
          # 自动检测修改的组件
          echo "Detecting changed components..."
          
          # 获取修改的文件列表
          if [ "$GH_EVENT_NAME" = "push" ]; then
            if [ -n "$GH_EVENT_BEFORE" ] && [ "$GH_EVENT_BEFORE" != "0000000000000000000000000000000000000000" ]; then
              CHANGED_FILES=$(git diff --name-only "$GH_EVENT_BEFORE" "$GH_SHA")
            else
              CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r "$GH_SHA")
            fi
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          fi
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "No changes detected"
            echo "components=" >> $GITHUB_OUTPUT
            echo "has-changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # 从 repos.csv 获取组件目录列表
          COMPONENT_DIRS=$(python3 - <<'PY'
          import csv
          from pathlib import Path

          csv_path = Path("scripts/repo/repos.csv")
          with csv_path.open(newline="", encoding="utf-8") as f:
              reader = csv.DictReader(f)
              for row in reader:
                  target_dir = (row.get("target_dir") or "").strip()
                  if target_dir:
                      print(target_dir)
          PY
          )
          echo "Available components: ${COMPONENT_DIRS}"
          
          # 分析修改的文件，找出涉及的组件
          declare -A CHANGED_COMPONENTS
          
          while IFS= read -r file; do
            for component in ${COMPONENT_DIRS}; do
              if [[ "$file" == "$component"* ]]; then
                CHANGED_COMPONENTS["$component"]=1
                echo "  Found change in component: $component (file: $file)"
                break
              fi
            done
          done <<< "$CHANGED_FILES"
          
          # 生成组件列表（逗号分隔）
          if [ ${#CHANGED_COMPONENTS[@]} -eq 0 ]; then
            echo "No component changes detected"
            echo "components=" >> $GITHUB_OUTPUT
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            COMPONENTS_LIST=$(IFS=','; echo "${!CHANGED_COMPONENTS[*]}")
            echo "components=${COMPONENTS_LIST}" >> $GITHUB_OUTPUT
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "Detected changed components: ${COMPONENTS_LIST}"
          fi

      - name: Configure Git
        if: steps.detect.outputs.has-changes == 'true'
        env:
          SUBTREE_PUSH_TOKEN: ${{ secrets.SUBTREE_PUSH_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 配置 git 使用 PAT 进行认证（token 通过 env 传入，不直接嵌入命令行）
          if [ -n "$SUBTREE_PUSH_TOKEN" ]; then
            git config --global credential.helper store
            printf 'https://x-access-token:%s@github.com\n' "$SUBTREE_PUSH_TOKEN" > ~/.git-credentials
            chmod 600 ~/.git-credentials
            echo "✅ Configured authentication with SUBTREE_PUSH_TOKEN"
          else
            echo "⚠️ SUBTREE_PUSH_TOKEN not set, using GITHUB_TOKEN (may fail for cross-repo push)"
          fi

      - name: Push components to target branch
        if: steps.detect.outputs.has-changes == 'true'
        env:
          COMPONENTS: ${{ steps.detect.outputs.components }}
          INPUT_BRANCH: ${{ inputs.branch }}
          INPUT_FORCE_PUSH: ${{ inputs.force_push }}
          GH_REF_NAME: ${{ github.ref_name }}
        run: |
          resolve_target_branch() {
          python3 - "$1" "$2" "$3" <<'PY'
          import csv
          import sys
          from pathlib import Path

          repo_name = sys.argv[1]
          source_branch = sys.argv[2]
          explicit_branch = sys.argv[3]

          if explicit_branch:
              print(explicit_branch)
              raise SystemExit(0)

          csv_path = Path("scripts/repo/repos.csv")
          with csv_path.open(newline="", encoding="utf-8") as f:
              reader = csv.DictReader(f)
              for row in reader:
                  url = (row.get("url") or "").strip().rstrip("/")
                  name = url.split("/")[-1]
                  if name.endswith(".git"):
                      name = name[:-4]
                  if name != repo_name:
                      continue

                  owner = url.split("/")[-2] if "/" in url else ""
                  if source_branch == "main":
                      print("release" if owner == "arceos-org" else "main")
                  elif source_branch == "dev":
                      print("dev")
                  else:
                      print((row.get("branch") or "").strip() or "dev")
                  raise SystemExit(0)

          raise SystemExit(f"Repository '{repo_name}' not found in scripts/repo/repos.csv")
          PY
          }

          FORCE_ARGS=""

          if [ "$INPUT_FORCE_PUSH" = "true" ]; then
          FORCE_ARGS="--force"
          echo "Force push enabled"
          fi

          if [ "$COMPONENTS" = "__all__" ]; then
          COMPONENTS=$(python3 - <<'PY'
          import csv
          from pathlib import Path

          csv_path = Path("scripts/repo/repos.csv")
          names = []
          with csv_path.open(newline="", encoding="utf-8") as f:
              reader = csv.DictReader(f)
              for row in reader:
                  target_dir = (row.get("target_dir") or "").strip()
                  if target_dir:
                      names.append(target_dir)
          print(",".join(names))
          PY
          )
          fi

          if [ -n "$INPUT_BRANCH" ]; then
          echo "Pushing changed components with manual target branch override: ${INPUT_BRANCH}"
          else
          echo "Pushing changed components using automatic branch mapping from source branch: ${GH_REF_NAME}"
          fi
          echo "Components: ${COMPONENTS}"

          IFS=',' read -ra COMP_ARRAY <<< "$COMPONENTS"

          SUCCESS=0
          FAIL=0

          for component in "${COMP_ARRAY[@]}"; do
          component=$(echo "$component" | xargs)
          repo_name=$(basename "${component}")

          echo ""
          echo "=========================================="
          echo "Pushing: ${repo_name}"
          echo "=========================================="

          TARGET_BRANCH=$(resolve_target_branch "${repo_name}" "${GH_REF_NAME}" "${INPUT_BRANCH}")
          echo "CI branch mapping: tgoskits ${GH_REF_NAME} -> ${repo_name} ${TARGET_BRANCH}"

          PUSH_CMD=(python3 scripts/repo/repo.py push "${repo_name}" -b "${TARGET_BRANCH}")

          if [ -n "$FORCE_ARGS" ]; then
            PUSH_CMD+=("${FORCE_ARGS}")
          fi

          if "${PUSH_CMD[@]}"; then
            echo "✅ Successfully pushed ${repo_name}"
            SUCCESS=$((SUCCESS + 1))
          else
            echo "❌ Failed to push ${repo_name}"
            FAIL=$((FAIL + 1))
          fi
          done

          echo ""
          echo "=========================================="
          echo "Push Summary"
          echo "=========================================="
          echo "✅ Success: ${SUCCESS}"
          echo "❌ Failed: ${FAIL}"
          echo "=========================================="

          if [ $FAIL -gt 0 ]; then
          echo "::error::${FAIL} component(s) failed to push"
          exit 1
          fi

      - name: Cleanup credentials
        if: always()
        run: |
          if [ -f ~/.git-credentials ]; then
            rm -f ~/.git-credentials
            git config --global --unset credential.helper || true
          fi

      - name: Create summary
        if: always()
        env:
          COMPONENTS: ${{ steps.detect.outputs.components }}
          INPUT_BRANCH: ${{ inputs.branch }}
          INPUT_FORCE_PUSH: ${{ inputs.force_push }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_REF_NAME: ${{ github.ref_name }}
          SUBTREE_PUSH_TOKEN: ${{ secrets.SUBTREE_PUSH_TOKEN }}
        run: |
          DISPLAY_COMPONENTS="${COMPONENTS}"
          if [ -n "$INPUT_BRANCH" ]; then
            TARGET_DESC="${INPUT_BRANCH} (manual override)"
          elif [ "$GH_REF_NAME" = "main" ]; then
            TARGET_DESC="auto: arceos-org/* -> release, others -> main"
          elif [ "$GH_REF_NAME" = "dev" ]; then
            TARGET_DESC="auto: all -> dev"
          else
            TARGET_DESC="auto: fallback -> dev"
          fi

          if [ -z "$DISPLAY_COMPONENTS" ]; then
            DISPLAY_COMPONENTS="No components were pushed"
          fi

          echo "## Push to Subrepos Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Components**: ${DISPLAY_COMPONENTS}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Branch Rule**: ${TARGET_DESC}" >> $GITHUB_STEP_SUMMARY
          echo "- **Force Push**: ${INPUT_FORCE_PUSH:-false}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${GH_EVENT_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "- **Source Branch**: ${GH_REF_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -n "$COMPONENTS" ]; then
            echo "The listed components were pushed according to the configured branch mapping rule." >> $GITHUB_STEP_SUMMARY
          else
            echo "No components were pushed in this run. If you expected a push, check whether the commit touched any configured component directories or specify components manually when dispatching the workflow." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 检查是否配置了 PAT
          if [ -z "$SUBTREE_PUSH_TOKEN" ]; then
            echo "⚠️ **Warning**: SUBTREE_PUSH_TOKEN is not configured." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To enable cross-repository push, please:" >> $GITHUB_STEP_SUMMARY
            echo "1. Create a PAT at https://github.com/settings/tokens/new with \`repo\` scope" >> $GITHUB_STEP_SUMMARY
            echo "2. Add it as \`SUBTREE_PUSH_TOKEN\` in repository secrets" >> $GITHUB_STEP_SUMMARY
          fi
