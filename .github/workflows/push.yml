name: Notify Parent Repository

on:
  push:
    branches:
      - main
      - zcs
  workflow_dispatch:

jobs:
  notify-parent:
    name: Notify Parent Repository
    # 调用 axci 仓库的可复用工作流
    uses: arceos-hypervisor/axci/.github/workflows/push.yml@main
    secrets:
      PARENT_REPO_TOKEN: ${{ secrets.PARENT_REPO_TOKEN }}
