name: Build & Test

on:
  push:
    paths-ignore:
      - "**/*.md"
      - "**/*.rst"
      - "**/*.adoc"
      - "docs/**"
      - "**/docs/**"
      - "**/doc/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "**/*.rst"
      - "**/*.adoc"
      - "docs/**"
      - "**/docs/**"
      - "**/doc/**"

permissions:
  contents: read
  packages: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - run: rustc --version
      - run: cargo fmt --all -- --check

  test_std:
    name: Test with std
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}-container:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-std
          save-if: ${{ github.event_name == 'push' }}

      - run: rustc --version
      - run: cargo xtask test

  test_os_target:
    name: Test ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}-container:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # axvisor
          - os: axvisor
            arch: aarch64
          # starry
          - os: starry
            arch: riscv64
          - os: starry
            arch: aarch64
          - os: starry
            arch: loongarch64
          - os: starry
            arch: x86_64
          # arceos
          - os: arceos
            arch: x86_64
          - os: arceos
            arch: riscv64
          - os: arceos
            arch: aarch64
          - os: arceos
            arch: loongarch64
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - run: rustc --version

      - name: Install FAT image tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends dosfstools

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.os }}-${{ matrix.arch }}
          save-if: ${{ github.event_name == 'push' }}

      - name: Run ${{ matrix.os }} tests
        run: cargo ${{ matrix.os }} test qemu --target ${{ matrix.arch }}

  test_axvisor_x86_64:
    name: Test axvisor x86_64
    runs-on:
      - self-hosted
      - linux
      - intel
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - run: rustc --version

      - name: Run axvisor x86_64 tests
        run: cargo axvisor test qemu --target x86_64

  test_axvisor_board:
    name: Test axvisor ${{ matrix.test_group }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - test_group: phytiumpi-linux
          - test_group: orangepi-5-plus-linux
          - test_group: roc-rk3568-pc-linux
    runs-on:
      - self-hosted
      - linux
      - board
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - run: rustc --version

      - name: Run axvisor board tests
        run: cargo axvisor test board -t ${{ matrix.test_group }}
