# modules
axalloc = { path = "os/arceos/modules/axalloc", version = "0.3.0-preview.3" }
axconfig = { path = "os/arceos/modules/axconfig", version = "0.3.0-preview.3" }
axdisplay = { path = "os/arceos/modules/axdisplay", version = "0.3.0-preview.3" }
axdma = { path = "os/arceos/modules/axdma", version = "0.3.0-preview.3" }
axdriver = { path = "os/arceos/modules/axdriver", version = "0.3.0-preview.3" }
axfs = { path = "os/arceos/modules/axfs", version = "0.3.0-preview.3" }
axfs-ng = { path = "os/arceos/modules/axfs-ng", version = "0.3.0-preview.3" }
axhal = { path = "os/arceos/modules/axhal", version = "0.3.0-preview.3" }
axinput = { path = "os/arceos/modules/axinput", version = "0.3.0-preview.3" }
axipi = { path = "os/arceos/modules/axipi", version = "0.3.0-preview.3" }
axlog = { path = "os/arceos/modules/axlog", version = "0.3.0-preview.3" }
axmm = { path = "os/arceos/modules/axmm", version = "0.3.0-preview.3" }
axnet = { path = "os/arceos/modules/axnet", version = "0.3.0-preview.3" }
axnet-ng = { path = "os/arceos/modules/axnet-ng", version = "0.3.0-preview.3" }
