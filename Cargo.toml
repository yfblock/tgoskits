anyhow = "1.0"
bindgen = "0.72"
buddy-slab-allocator = "0.2"
cfg-if = "1.0"
chrono = { version = "0.4", default-features = false }
crate_interface = "0.3"
ctor_bare = "0.2"
event-listener = { version = "5.4.0", default-features = false }
kernel_guard = "0.1"
kspin = "0.1"
lazyinit = "0.2"

# === starry-* ===
starry-process = "0.2"
starry-signal = "0.3"
starry-vm = "0.3"
