starry-kernel = { path = "os/StarryOS/kernel", version = "0.3.0-preview.3" }

axcpu = { version = "0.3.0-preview.8" }
axplat = { version = "0.3.1-pre.6" }
axplat-aarch64-bsta1000b = "0.3.1-pre.6"
axplat-aarch64-peripherals = "0.3.1-pre.6"
axplat-aarch64-phytium-pi = "0.3.1-pre.6"
