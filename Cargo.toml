[workspace.package]
edition = "2024"
version = "0.3.0-preview.3"
authors = ["RCore Team <yuchen@tsinghua.edu.cn>"]
license = "GPL-3.0-or-later OR Apache-2.0 OR MulanPSL-2.0"
homepage = "https://github.com/rcore-os/tgoskits"
repository = "https://github.com/rcore-os/tgoskits"
keywords = ["arceos", "kernel"]
categories = ["os", "no-std"]

[profile.release]
lto = true

[workspace]
resolver = "3"
members = [
    "xtask",

    # components
    "components/aarch64_sysreg",
    "components/arm_pl011",
    "components/arm_pl031",
    "components/arm_vcpu",
    "components/arm_vgic",
    "components/axaddrspace",
    "components/axallocator",
    "components/axbacktrace",
    "components/axdevice",
    "components/axdevice_base",
    "components/axerrno",
    "components/axfs-ng-vfs",
    "components/axhvc",
    "components/axio",
    "components/axklib",
    "components/axpoll",
    "components/axsched",
    "components/axvcpu",
    "components/axvm",
    "components/axvmconfig",
    "components/bitmap-allocator",
    "components/cap_access",
    "components/cpumask",
    "components/handler_table",
    "components/int_ratio",
    "components/kernel_guard",
    "components/kspin",
    "components/lazyinit",
    "components/linked_list_r4l",
    "components/range-alloc-arceos",
    "components/riscv-h",
    "components/riscv_plic",
    "components/riscv_vcpu",
    "components/riscv_vplic",
    "components/rsext4",
    "components/scope-local",
    "components/starry-process",
    "components/starry-signal",
    "components/starry-smoltcp",
    "components/starry-vm",
    "components/timer_list",
    "components/axfs_crates/axfs_vfs",
    "components/axfs_crates/axfs_ramfs",
    "components/axfs_crates/axfs_devfs",

    # os/arceos/modules
    "os/arceos/modules/axalloc",
    "os/arceos/modules/axconfig",
    "os/arceos/modules/axdisplay",
    "os/arceos/modules/axdma",
    "os/arceos/modules/axdriver",
    "os/arceos/modules/axfs",
    "os/arceos/modules/axfs-ng",
    "os/arceos/modules/axhal",
    "os/arceos/modules/axinput",
    "os/arceos/modules/axipi",
    "os/arceos/modules/axlog",
    "os/arceos/modules/axmm",
    "os/arceos/modules/axnet",
    "os/arceos/modules/axnet-ng",
    "os/arceos/modules/axruntime",
    "os/arceos/modules/axsync",
    "os/arceos/modules/axtask",

    # os/arceos/api
    "os/arceos/api/axfeat",
    "os/arceos/api/arceos_api",
    "os/arceos/api/arceos_posix_api",

    # os/arceos/ulib
    "os/arceos/ulib/axstd",
    "os/arceos/ulib/axlibc",

    # os/arceos/examples
    "os/arceos/examples/helloworld",
    "os/arceos/examples/helloworld-myplat",
    "os/arceos/examples/httpclient",
    "os/arceos/examples/httpserver",
    "os/arceos/examples/shell",

    # test-suit
    "test-suit/arceos/task/*",
    "test-suit/starryos",

    # os/axvisor
    "os/axvisor",

    # os/StarryOS
    "os/StarryOS/starryos",
    "os/StarryOS/kernel",

    # scripts
    "scripts/axbuild",

    # platform
    "platform/axplat-dyn",
    "platform/x86-qemu-q35",
]
exclude = [
    # workspace directories
    "components/axplat_crates",
    "os/arceos",
    "os/StarryOS",
    "components/percpu",
    "components/axvisor_api",
    "components/crate_interface",
    "components/ctor_bare",
    "components/page_table_multiarch",
    "components/axconfig-gen",
    "components/axdriver_crates",
    "components/axmm_crates",
    "components/starry-smoltcp/fuzz",
    "components/crate_interface/test_crates",
    "components/axfs_crates",
]

[patch.crates-io]
# === axerrno ===
axerrno = { path = "components/axerrno", version = "0.2.2" }

axconfig = { path = "os/arceos/modules/axconfig", version = "0.3.0-preview.3" }
axhal = { path = "os/arceos/modules/axhal", version = "0.3.0-preview.3" }

axcpu = { path = "components/axcpu" }
axio = { path = "components/axio" }
axpoll = { path = "components/axpoll" }
axfs-ng-vfs = { path = "components/axfs-ng-vfs" }
axfs_vfs = { path = "components/axfs_crates/axfs_vfs" }
axfs_ramfs = { path = "components/axfs_crates/axfs_ramfs" }
axfs_devfs = { path = "components/axfs_crates/axfs_devfs" }

axfs = { path = "os/arceos/modules/axfs", version = "0.3.0-preview.3" }
axfs-ng = { path = "os/arceos/modules/axfs-ng", version = "0.3.0-preview.3" }
axnet = { path = "os/arceos/modules/axnet", version = "0.3.0-preview.3" }
axnet-ng = { path = "os/arceos/modules/axnet-ng", version = "0.3.0-preview.3" }
axalloc = { path = "os/arceos/modules/axalloc", version = "0.3.0-preview.3" }
axdriver = { path = "os/arceos/modules/axdriver", version = "0.3.0-preview.3" }
axlog = { path = "os/arceos/modules/axlog", version = "0.3.0-preview.3" }
axmm = { path = "os/arceos/modules/axmm", version = "0.3.0-preview.3" }
axruntime = { path = "os/arceos/modules/axruntime", version = "0.3.0-preview.3" }
axsync = { path = "os/arceos/modules/axsync", version = "0.3.0-preview.3" }
axtask = { path = "os/arceos/modules/axtask", version = "0.3.0-preview.3" }
axfeat = { path = "os/arceos/api/axfeat", version = "0.3.0-preview.3" }
arceos_api = { path = "os/arceos/api/arceos_api", version = "0.3.0-preview.3" }
arceos_posix_api = { path = "os/arceos/api/arceos_posix_api", version = "0.3.0-preview.3" }
axstd = { path = "os/arceos/ulib/axstd", version = "0.3.0-preview.3" }
axlibc = { path = "os/arceos/ulib/axlibc", version = "0.3.0-preview.3" }

# === axplat ===
axplat = { path = "components/axplat_crates/axplat" }
axplat-macros = { path = "components/axplat_crates/axplat-macros" }
axplat-aarch64-bsta1000b = { path = "components/axplat_crates/platforms/axplat-aarch64-bsta1000b" }
axplat-aarch64-peripherals = { path = "components/axplat_crates/platforms/axplat-aarch64-peripherals" }
axplat-aarch64-phytium-pi = { path = "components/axplat_crates/platforms/axplat-aarch64-phytium-pi" }
axplat-aarch64-qemu-virt = { path = "components/axplat_crates/platforms/axplat-aarch64-qemu-virt" }
axplat-aarch64-raspi = { path = "components/axplat_crates/platforms/axplat-aarch64-raspi" }
axplat-loongarch64-qemu-virt = { path = "components/axplat_crates/platforms/axplat-loongarch64-qemu-virt" }
axplat-riscv64-qemu-virt = { path = "components/axplat_crates/platforms/axplat-riscv64-qemu-virt" }
axplat-x86-pc = { path = "components/axplat_crates/platforms/axplat-x86-pc" }
axplat-x86-qemu-q35 = { path = "platform/x86-qemu-q35" }

axplat-dyn = { path = "platform/axplat-dyn", version = "0.3.0-preview.3" }

# === axdriver ===
axdriver_base = { path = "components/axdriver_crates/axdriver_base" }
axdriver_block = { path = "components/axdriver_crates/axdriver_block" }
axdriver_display = { path = "components/axdriver_crates/axdriver_display" }
axdriver_net = { path = "components/axdriver_crates/axdriver_net" }
axdriver_pci = { path = "components/axdriver_crates/axdriver_pci" }
axdriver_virtio = { path = "components/axdriver_crates/axdriver_virtio" }

# === percpu ===
percpu = { path = "components/percpu/percpu" }
percpu_macros = { path = "components/percpu/percpu_macros" }

# === page_table ===
page_table_entry = { path = "components/page_table_multiarch/page_table_entry" }
page_table_multiarch = { path = "components/page_table_multiarch/page_table_multiarch" }

# === crate_interface ===
crate_interface_lite = { path = "components/crate_interface/crate_interface_lite" }

# === ctor_bare ===
ctor_bare = { path = "components/ctor_bare/ctor_bare" }
ctor_bare_macros = { path = "components/ctor_bare/ctor_bare_macros" }

# === memory (axmm_crates) ===
memory_addr = { path = "components/axmm_crates/memory_addr" }
memory_set = { path = "components/axmm_crates/memory_set" }

# === bitmap-allocator ===
bitmap-allocator = { path = "components/bitmap-allocator" }

# === kernel_guard ===
kernel_guard = { path = "components/kernel_guard", version = "0.1.3" }

# === kspin ===
kspin = { path = "components/kspin", version = "0.1.1" }

# === starry-process ===
starry-process = { path = "components/starry-process", version = "0.2.0" }

# === starry-signal ===
starry-signal = { path = "components/starry-signal", version = "0.3.0" }

# === starry-vm ===
starry-vm = { path = "components/starry-vm", version = "0.3.0" }

scope-local = { path = "components/scope-local", version = "0.1.0" }

axbuild = { path = "scripts/axbuild", version = "0.3.0-preview.3" }

# === axvisor ===
axvm = { path = "components/axvm", version = "0.3" }
axvmconfig = { path = "components/axvmconfig", version = "0.2.2" }
axvcpu = { path = "components/axvcpu", version = "0.3" }
x86_vcpu = { path = "components/x86_vcpu", version = "0.3" }
x86_vlapic = { path = "components/x86_vlapic", version = "0.2.2" }
arm_vcpu = { path = "components/arm_vcpu", version = "0.3" }
arm_vgic = { path = "components/arm_vgic", version = "0.2.2" }
aarch64_sysreg = { path = "components/aarch64_sysreg", version = "0.1.1" }
riscv_vcpu = { path = "components/riscv_vcpu", version = "0.3" }
riscv_vplic = { path = "components/riscv_vplic", version = "0.2.2" }
riscv-h = { path = "components/riscv-h", version = "0.2" }
axaddrspace = { path = "components/axaddrspace", version = "0.3" }
axdevice = { path = "components/axdevice", version = "0.2.2" }
axdevice_base = { path = "components/axdevice_base", version = "0.2.2" }
axvisor_api = { path = "components/axvisor_api", version = "0.3" }
axhvc = { path = "components/axhvc", version = "0.2.0" }
axklib = { path = "components/axklib", version = "0.3.0" }
range-alloc-arceos = { path = "components/range-alloc-arceos", version = "0.1.4" }

[workspace.dependencies]
# === os/arceos crates (0.3.0-preview.3) ===
# ulib
axstd = { path = "os/arceos/ulib/axstd", version = "0.3.0-preview.3" }
axlibc = { path = "os/arceos/ulib/axlibc", version = "0.3.0-preview.3" }

# api
arceos_api = { path = "os/arceos/api/arceos_api", version = "0.3.0-preview.3" }
arceos_posix_api = { path = "os/arceos/api/arceos_posix_api", version = "0.3.0-preview.3" }
