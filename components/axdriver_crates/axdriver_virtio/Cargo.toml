[package]
name = "ax-driver-virtio"
edition.workspace = true
version = "0.3.11"
repository.workspace = true
authors.workspace = true
description = "Wrappers of some devices in the `virtio-drivers` crate, that implement traits in the `ax-driver-base` series crates"
keywords = ["arceos", "driver", "virtio"]
categories.workspace = true
readme = "README.md"
license.workspace = true

[features]
alloc = ["virtio-drivers/alloc"]
block = ["ax-driver-block"]
gpu = ["alloc", "ax-driver-display"]
input = ["alloc", "ax-driver-input"]
net = ["alloc", "ax-driver-net"]
socket = ["alloc", "ax-driver-vsock"]

[dependencies]
ax-driver-base = { version = "0.3" }
ax-driver-block = { version = "0.3", optional = true }
ax-driver-display = { version = "0.3", optional = true }
ax-driver-input = { version = "0.3", optional = true }
ax-driver-net = { version = "0.3", optional = true }
ax-driver-vsock = { version = "0.3", optional = true }
log = { workspace = true }
virtio-drivers = { version = "0.13.0", default-features = false }
