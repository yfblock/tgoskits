[package]
name = "hello-kernel"
version = "0.3.1"
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true
publish = false

[dependencies]
cfg-if = "1.0"
ax-plat = { workspace = true }

[target.'cfg(target_arch = "x86_64")'.dependencies]
ax-plat-x86-pc = { path = "../../platforms/axplat-x86-pc" }

[target.'cfg(target_arch = "aarch64")'.dependencies]
ax-plat-aarch64-qemu-virt = { path = "../../platforms/axplat-aarch64-qemu-virt" }

[target.'cfg(target_arch = "riscv64")'.dependencies]
ax-plat-riscv64-qemu-virt = { path = "../../platforms/axplat-riscv64-qemu-virt" }

[target.'cfg(target_arch = "loongarch64")'.dependencies]
ax-plat-loongarch64-qemu-virt = { path = "../../platforms/axplat-loongarch64-qemu-virt" }
