[package]
name = "ax-plat-aarch64-phytium-pi"
version = "0.5.7"
repository.workspace = true
description = "Implementation of `axplat` hardware abstraction layer for Phytium Pi board."
keywords = ["arceos", "os", "hal", "embedded", "aarch64"]
categories = ["embedded", "no-std", "hardware-support", "os"]
edition.workspace = true
authors.workspace = true
license.workspace = true

[features]
fp-simd = ["ax-cpu/fp-simd"]
irq = ["ax-plat/irq", "ax-plat-aarch64-peripherals/irq"]
rtc = []
smp = ["ax-plat/smp"]

[dependencies]
log = "0.4"
ax-page-table-entry = "0.8"
ax-config-macros = "0.4"
ax-plat-aarch64-peripherals = { workspace = true }
ax-cpu = { workspace = true }
ax-plat = { workspace = true }

[package.metadata.docs.rs]
targets = ["aarch64-unknown-none"]
