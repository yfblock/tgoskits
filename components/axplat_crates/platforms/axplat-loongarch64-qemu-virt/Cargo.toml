[package]
name = "ax-plat-loongarch64-qemu-virt"
version.workspace = true
description = "Implementation of `axplat` hardware abstraction layer for QEMU LoongArch virtual machine."
documentation = "https://docs.rs/ax-plat-loongarch64-qemu-virt"
keywords = ["arceos", "os", "hal", "embedded", "loongarch"]
categories = ["embedded", "no-std", "hardware-support", "os"]
edition.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[features]
fp-simd = ["ax-cpu/fp-simd"]
irq = ["ax-plat/irq"]
rtc = ["dep:chrono"]
smp = ["ax-plat/smp", "ax-kspin/smp", "irq"]

[dependencies]
chrono = { version = "0.4", default-features = false, optional = true }
ax-kspin = "0.3.1"
ax-lazyinit = "0.4.2"
log = "0.4"
loongArch64 = "0.2.4"
ax-page-table-entry = "0.8.1"
uart_16550 = "0.5"

ax-config-macros = "0.4.1"
ax-cpu = { workspace = true }
ax-plat = { workspace = true }

[package.metadata.docs.rs]
targets = ["loongarch64-unknown-none"]
