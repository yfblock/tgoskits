[package]
name = "ax-plat-riscv64-qemu-virt"
version.workspace = true
description = "Implementation of `axplat` hardware abstraction layer for QEMU RISC-V virt board."
documentation = "https://docs.rs/ax-plat-riscv64-qemu-virt"
keywords = ["arceos", "os", "hal", "embedded", "riscv"]
categories = ["embedded", "no-std", "hardware-support", "os"]
edition.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[features]
fp-simd = ["ax-cpu/fp-simd"]
irq = ["ax-plat/irq", "dep:ax-riscv-plic"]
rtc = ["dep:riscv_goldfish"]
smp = ["ax-plat/smp"]

[dependencies]
ax-kspin = "0.3.1"
ax-lazyinit = "0.4.2"
log = "0.4"
riscv = "0.16"
riscv_goldfish = { version = "0.1", optional = true }
ax-riscv-plic = { version = "0.4.0", optional = true }
sbi-rt = { version = "0.0.3", features = ["legacy"] }
uart_16550 = "0.5.0"

ax-config-macros = "0.4.1"
ax-cpu = { workspace = true }
ax-plat = { workspace = true }

[package.metadata.docs.rs]
targets = ["riscv64gc-unknown-none-elf"]
