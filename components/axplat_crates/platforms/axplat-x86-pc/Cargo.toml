[package]
name = "ax-plat-x86-pc"
version = "0.5.7"
repository.workspace = true
description = "Implementation of `axplat` hardware abstraction layer for x86 Standard PC machine."
keywords = ["arceos", "os", "hal", "x86"]
categories = ["no-std", "hardware-support", "os"]
edition.workspace = true
authors.workspace = true
license.workspace = true

[features]
fp-simd = ["ax-cpu/fp-simd"]
irq = ["ax-plat/irq"]
rtc = ["x86_rtc"]
smp = ["ax-plat/smp", "ax-kspin/smp"]
reboot-on-system-off = []

[dependencies]
ax-kspin = "0.3"
log = "0.4"
bitflags = "2.6"
ax-int-ratio = "0.3"
ax-lazyinit = "0.4"
ax-percpu.workspace = true
heapless = "0.9"
ax-config-macros = "0.4"
ax-cpu = { workspace = true }
ax-plat = { workspace = true }

x86 = "0.52"
x86_64 = "0.15.2"
x2apic = "0.5"
multiboot = "0.8"
raw-cpuid = "11.5"
uart_16550 = "0.5"
x86_rtc = { version = "0.1", optional = true }

[package.metadata.docs.rs]
targets = ["x86_64-unknown-none"]
