[package]
name = "ax-kernel-guard"
version = "0.3.3"
edition = "2021"
authors = ["Yuekai Jia <equation618@gmail.com>"]
description = "RAII wrappers to create a critical section with local IRQs or preemption disabled"
license = "Apache-2.0"
homepage = "https://github.com/arceos-org/arceos"
repository = "https://github.com/arceos-org/kernel_guard"
documentation = "https://docs.rs/ax-kernel-guard"
keywords = ["arceos", "synchronization", "preemption"]
categories = ["os", "no-std"]

[features]
preempt = []
default = []

[dependencies]
cfg-if = "1.0"
ax-crate-interface = "0.5.0"
