[workspace]
resolver = "3"

members = [
    "modules/axalloc",
    "modules/axconfig",
    "modules/axdisplay",
    "modules/axdma",
    "modules/axdriver",
    "modules/axfs",
    "modules/axfs-ng",
    "modules/axhal",
    "modules/axinput",
    "modules/axipi",
    "modules/axlog",
    "modules/axmm",
    "modules/axnet",
    "modules/axnet-ng",
    "modules/axruntime",
    "modules/axsync",
    "modules/axtask",

    "api/axfeat",
    "api/arceos_api",
    "api/arceos_posix_api",

    "ulib/axstd",
    "ulib/axlibc",

    "examples/helloworld",
    "examples/helloworld-myplat",
    "examples/httpclient",
    "examples/httpserver",
    "examples/shell",
]
default-members = [
    "modules/axalloc",
    "modules/axconfig",
    "modules/axdisplay",
    "modules/axdma",
    "modules/axdriver",
    "modules/axfs",
    "modules/axfs-ng",
    "modules/axhal",
    "modules/axinput",
    "modules/axipi",
    "modules/axlog",
    "modules/axmm",
    "modules/axnet",
    "modules/axnet-ng",
    "modules/axruntime",
    "modules/axsync",
    "modules/axtask",

    "api/axfeat",
    "api/arceos_api",
    "api/arceos_posix_api",

    "ulib/axstd",
    "ulib/axlibc",
]

[workspace.package]
version = "0.5.0"
edition = "2024"
authors = ["Yuekai Jia <equation618@gmail.com>"]
license = "GPL-3.0-or-later OR Apache-2.0 OR MulanPSL-2.0"
homepage = "https://github.com/arceos-org/arceos"
repository = "https://github.com/arceos-org/arceos"
keywords = ["arceos", "kernel"]
categories = ["os", "no-std"]

[workspace.dependencies]
axstd = { version = "0.5.0", path = "ulib/axstd" }
axlibc = { version = "0.5.0", path = "ulib/axlibc" }

arceos_api = { version = "0.5.0", path = "api/arceos_api" }
arceos_posix_api = { version = "0.5.0", path = "api/arceos_posix_api" }
axfeat = { version = "0.5.0", path = "api/axfeat" }

axalloc = { version = "0.5.0", path = "modules/axalloc" }
axconfig = { version = "0.5.0", path = "modules/axconfig" }
axdisplay = { version = "0.5.0", path = "modules/axdisplay" }
axdma = { version = "0.5.0", path = "modules/axdma" }
axdriver = { version = "0.5.0", path = "modules/axdriver" }
axfs = { version = "0.5.0", path = "modules/axfs" }
axfs-ng = { version = "0.5.0", path = "modules/axfs-ng" }
axhal = { version = "0.5.0", path = "modules/axhal" }
axinput = { version = "0.5.0", path = "modules/axinput" }
axipi = { version = "0.5.0", path = "modules/axipi" }
axlog = { version = "0.5.0", path = "modules/axlog" }
axmm = { version = "0.5.0", path = "modules/axmm" }
axnet = { version = "0.5.0", path = "modules/axnet" }
axnet-ng = { version = "0.5.0", path = "modules/axnet-ng" }
axplat-dyn = { version = "0.5.0", default-features = false }
axruntime = { version = "0.5.0", path = "modules/axruntime" }
axsync = { version = "0.5.0", path = "modules/axsync" }
axtask = { version = "0.5.0", path = "modules/axtask" }

axallocator = { version = "0.4.0", features = ["axerrno"] }
axbacktrace = "0.3.2"
axdriver_base = "0.3.4"
axdriver_block = "0.3.4"
axdriver_display = "0.3.4"
axdriver_input = "0.3.4"
axdriver_net = "0.3.4"
axdriver_pci = "0.3.4"
axdriver_virtio = "0.3.4"
axdriver_vsock = "0.3.4"
axerrno = "0.4.2"
axfs-ng-vfs = "0.3.1"
axio = "0.5.0"
axklib = "0.5.0"
axcpu = "0.5.0"
axplat = "0.5.1"
axplat-aarch64-bsta1000b = "0.5.1"
axplat-aarch64-phytium-pi = "0.5.1"
axplat-aarch64-qemu-virt = "0.5.1"
axplat-aarch64-raspi = "0.5.1"
axplat-loongarch64-qemu-virt = "0.5.1"
axplat-riscv64-qemu-virt = "0.5.0"
axplat-x86-pc = "0.5.1"
axpoll = "0.3.2"
timer_list = "0.3.0"
bindgen = "0.72"
buddy-slab-allocator = "0.2"
cfg-if = "1.0"
chrono = { version = "0.4", default-features = false }
crate_interface = "0.5.0"
ctor_bare = "0.4.1"
event-listener = { version = "5.4.0", default-features = false }
kernel_guard = "0.3.3"
kspin = "0.3.1"
lazyinit = "0.4.2"
lazy_static = { version = "1.5", features = ["spin_no_std"] }
lock_api = { version = "0.4", default-features = false }
log = "0.4"
memory_addr = "0.6.1"
page_table_multiarch = { version = "0.8.1", features = ["axerrno"] }
percpu = "0.4.3"
scope-local = "0.3.2"
spin = "0.10"
