[workspace]
resolver = "3"

members = [
    "modules/axalloc",
    "modules/axconfig",
    "modules/axdisplay",
    "modules/axdma",
    "modules/axdriver",
    "modules/axfs",
    "modules/axfs-ng",
    "modules/axhal",
    "modules/axinput",
    "modules/axipi",
    "modules/axlog",
    "modules/axmm",
    "modules/axnet",
    "modules/axnet-ng",
    "modules/axruntime",
    "modules/axsync",
    "modules/axtask",

    "api/axfeat",
    "api/arceos_api",
    "api/arceos_posix_api",

    "ulib/axstd",
    "ulib/axlibc",

    "examples/helloworld",
    "examples/helloworld-myplat",
    "examples/httpclient",
    "examples/httpserver",
    "examples/shell",
]
default-members = [
    "modules/axalloc",
    "modules/axconfig",
    "modules/axdisplay",
    "modules/axdma",
    "modules/axdriver",
    "modules/axfs",
    "modules/axfs-ng",
    "modules/axhal",
    "modules/axinput",
    "modules/axipi",
    "modules/axlog",
    "modules/axmm",
    "modules/axnet",
    "modules/axnet-ng",
    "modules/axruntime",
    "modules/axsync",
    "modules/axtask",

    "api/axfeat",
    "api/arceos_api",
    "api/arceos_posix_api",

    "ulib/axstd",
    "ulib/axlibc",
]

[workspace.package]
version = "0.5.0"
edition = "2024"
authors = ["Yuekai Jia <equation618@gmail.com>"]
license = "GPL-3.0-or-later OR Apache-2.0 OR MulanPSL-2.0"
homepage = "https://github.com/arceos-org/arceos"
repository = "https://github.com/arceos-org/arceos"
keywords = ["arceos", "kernel"]
categories = ["os", "no-std"]

[workspace.dependencies]
ax-std = { version = "0.5.0", path = "ulib/axstd" }
ax-libc = { version = "0.5.0", path = "ulib/axlibc" }

ax-api = { version = "0.5.0", path = "api/arceos_api" }
ax-posix-api = { version = "0.5.0", path = "api/arceos_posix_api" }
ax-feat = { version = "0.5.0", path = "api/axfeat" }

ax-alloc = { version = "0.5.0", path = "modules/axalloc" }
ax-config = { version = "0.5.0", path = "modules/axconfig" }
ax-display = { version = "0.5.0", path = "modules/axdisplay" }
ax-dma = { version = "0.5.0", path = "modules/axdma" }
ax-driver = { version = "0.5.0", path = "modules/axdriver" }
ax-fs = { version = "0.5.0", path = "modules/axfs" }
ax-fs-ng = { version = "0.5.0", path = "modules/axfs-ng" }
ax-hal = { version = "0.5.0", path = "modules/axhal" }
ax-input = { version = "0.5.0", path = "modules/axinput" }
ax-ipi = { version = "0.5.0", path = "modules/axipi" }
ax-log = { version = "0.5.0", path = "modules/axlog" }
ax-mm = { version = "0.5.0", path = "modules/axmm" }
ax-net = { version = "0.5.0", path = "modules/axnet" }
ax-net-ng = { version = "0.5.0", path = "modules/axnet-ng" }
axplat-dyn = { version = "0.5.0", default-features = false }
ax-runtime = { version = "0.5.0", path = "modules/axruntime" }
ax-sync = { version = "0.5.0", path = "modules/axsync" }
ax-task = { version = "0.5.0", path = "modules/axtask" }

ax-allocator = { version = "0.4.0", features = ["ax-errno"] }
axbacktrace = "0.3.2"
ax-driver-base = "0.3.4"
ax-driver-block = "0.3.4"
ax-driver-display = "0.3.4"
ax-driver-input = "0.3.4"
ax-driver-net = "0.3.4"
ax-driver-pci = "0.3.4"
ax-driver-virtio = "0.3.4"
ax-driver-vsock = "0.3.4"
ax-errno = "0.4.2"
axfs-ng-vfs = "0.3.1"
ax-io = "0.5.0"
axklib = "0.5.0"
ax-cpu = "0.5.0"
ax-plat = "0.5.1"
ax-plat-aarch64-bsta1000b = "0.5.1"
ax-plat-aarch64-phytium-pi = "0.5.1"
ax-plat-aarch64-qemu-virt = "0.5.1"
ax-plat-aarch64-raspi = "0.5.1"
ax-plat-loongarch64-qemu-virt = "0.5.1"
ax-plat-riscv64-qemu-virt = "0.5.0"
ax-plat-x86-pc = "0.5.1"
axpoll = "0.3.2"
timer_list = "0.3.0"
bindgen = "0.72"
buddy-slab-allocator = "0.2"
cfg-if = "1.0"
chrono = { version = "0.4", default-features = false }
ax-crate-interface = "0.5.0"
ctor_bare = "0.4.1"
event-listener = { version = "5.4.0", default-features = false }
ax-kernel-guard = "0.3.3"
ax-kspin = "0.3.1"
ax-lazyinit = "0.4.2"
lazy_static = { version = "1.5", features = ["spin_no_std"] }
lock_api = { version = "0.4", default-features = false }
log = "0.4"
ax-memory-addr = "0.6.1"
ax-page-table-multiarch = { version = "0.8.1", features = ["ax-errno"] }
ax-percpu = "0.4.3"
scope-local = "0.3.2"
spin = "0.10"
