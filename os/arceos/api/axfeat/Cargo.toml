[package]
name = "ax-feat"
version = "0.5.11"
repository = "https://github.com/rcore-os/tgoskits"
edition.workspace = true
authors = ["Yuekai Jia <equation618@gmail.com>"]
description = "Top-level feature selection for ArceOS"
license.workspace = true

[features]
default = []

# Multicore
smp = ["ax-hal/smp", "ax-runtime/smp", "ax-task?/smp", "ax-kspin/smp"]

# Floating point/SIMD
fp-simd = ["ax-hal/fp-simd"]

# User space support
uspace = ["ax-hal/uspace"]
hv = ["ax-hal/hv"]

# Interrupts
irq = ["ax-hal/irq", "ax-runtime/irq", "ax-task?/irq", "ax-driver?/irq"]
ipi = ["irq", "dep:ax-ipi", "ax-hal/ipi", "ax-runtime/ipi"]

# Custom or default platforms
myplat = ["ax-hal/myplat"]
defplat = ["ax-hal/defplat"]
plat-dyn = [
    "ax-hal/plat-dyn",
    "paging",
    "ax-runtime/plat-dyn",
    "ax-config/plat-dyn",
]

# Memory
alloc = ["ax-alloc", "ax-runtime/alloc"]
alloc-tlsf = ["ax-alloc/tlsf"]
alloc-slab = ["ax-alloc/slab"]
alloc-buddy = ["ax-alloc/buddy"]
page-alloc-64g = ["ax-alloc/page-alloc-64g"]                  # up to 64G memory capacity
page-alloc-4g = ["ax-alloc/page-alloc-4g"]                    # up to 4G memory capacity
paging = ["alloc", "ax-hal/paging", "ax-runtime/paging"]
tls = ["alloc", "ax-hal/tls", "ax-runtime/tls", "ax-task?/tls"]
dma = ["alloc", "paging"]

# Multi-threading and scheduler
multitask = [
    "alloc",
    "ax-task/multitask",
    "ax-sync/multitask",
    "ax-runtime/multitask",
]
task-ext = ["ax-task/task-ext"]
sched-fifo = ["ax-task/sched-fifo"]
sched-rr = ["ax-task/sched-rr", "irq"]
sched-cfs = ["ax-task/sched-cfs", "irq"]

# File system
fs = [
    "alloc",
    "paging",
    "ax-driver/virtio-blk",
    "dep:ax-fs",
    "ax-runtime/fs",
] # TODO: try to remove "paging"
fs-ng = ["fs", "ax-runtime/fs-ng"]
fs-ng-ext4 = ["fs-ng", "ax-fs-ng/ext4"]
fs-ng-fat = ["fs-ng", "ax-fs-ng/fat"]
fs-ng-times = ["fs-ng", "ax-fs-ng/times"]

# Networking
net = ["alloc", "paging", "ax-driver/virtio-net", "dep:ax-net", "ax-runtime/net"]
net-ng = ["net", "irq", "multitask", "ax-runtime/net-ng"]
vsock = ["ax-runtime/vsock"]

# Display
display = [
    "alloc",
    "paging",
    "ax-driver/virtio-gpu",
    "dep:ax-display",
    "ax-runtime/display",
]

# Input
input = [
    "alloc",
    "paging",
    "ax-driver/virtio-input",
    "dep:ax-input",
    "ax-runtime/input",
]

# Real Time Clock (RTC) Driver.
rtc = ["ax-hal/rtc", "ax-runtime/rtc"]

# Device drivers
bus-mmio = ["ax-driver?/bus-mmio"]
bus-pci = ["ax-driver?/bus-pci"]
driver-ramdisk = ["ax-driver?/ramdisk", "ax-fs?/use-ramdisk"]
driver-sdmmc = ["ax-driver?/sdmmc"]
driver-ixgbe = ["ax-driver?/ixgbe"]
driver-fxmac = ["ax-driver?/fxmac"]                          # fxmac ethernet driver for PhytiumPi
driver-bcm2835-sdhci = ["ax-driver?/bcm2835-sdhci"]
driver-ahci = ["ax-driver?/ahci"]

# Backtrace
dwarf = ["alloc", "axbacktrace/dwarf"]

[dependencies]
ax-alloc = { workspace = true, optional = true }
axbacktrace.workspace = true
ax-config = { workspace = true, optional = true }
ax-display = { workspace = true, optional = true }
ax-driver = { workspace = true, optional = true }
ax-fs = { workspace = true, optional = true }
ax-fs-ng = { workspace = true, optional = true }
ax-hal.workspace = true
ax-input = { workspace = true, optional = true }
ax-ipi = { workspace = true, optional = true }
ax-log.workspace = true
ax-net = { workspace = true, optional = true }
ax-runtime.workspace = true
ax-sync = { workspace = true, optional = true }
ax-task = { workspace = true, optional = true }
ax-kspin = { workspace = true, optional = true }
