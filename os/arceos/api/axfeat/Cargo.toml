[package]
name = "ax-feat"
version.workspace = true
edition.workspace = true
authors = ["Yuekai Jia <equation618@gmail.com>"]
description = "Top-level feature selection for ArceOS"
license.workspace = true
homepage.workspace = true
repository = "https://github.com/arceos-org/arceos/tree/main/api/axfeat"

[features]
default = []

# Multicore
smp = ["axhal/smp", "ax-runtime/smp", "axtask?/smp", "kspin/smp"]

# Floating point/SIMD
fp-simd = ["axhal/fp-simd"]

# User space support
uspace = ["axhal/uspace"]
hv = ["axhal/hv"]

# Interrupts
irq = ["axhal/irq", "ax-runtime/irq", "axtask?/irq", "ax-driver?/irq"]
ipi = ["irq", "dep:ax-ipi", "axhal/ipi", "ax-runtime/ipi"]

# Custom or default platforms
myplat = ["axhal/myplat"]
defplat = ["axhal/defplat"]
plat-dyn = [
    "axhal/plat-dyn",
    "paging",
    "ax-runtime/plat-dyn",
    "axconfig/plat-dyn",
]

# Memory
alloc = ["axalloc", "ax-runtime/alloc"]
alloc-tlsf = ["axalloc/tlsf"]
alloc-slab = ["axalloc/slab"]
alloc-buddy = ["axalloc/buddy"]
alloc-level-1 = ["axalloc/level-1", "alloc"]
page-alloc-64g = ["axalloc/page-alloc-64g"]                  # up to 64G memory capacity
page-alloc-4g = ["axalloc/page-alloc-4g"]                    # up to 4G memory capacity
paging = ["alloc", "axhal/paging", "ax-runtime/paging"]
tls = ["alloc", "axhal/tls", "ax-runtime/tls", "axtask?/tls"]
dma = ["alloc", "paging"]

# Multi-threading and scheduler
multitask = [
    "alloc",
    "axtask/multitask",
    "ax-sync/multitask",
    "ax-runtime/multitask",
]
task-ext = ["axtask/task-ext"]
sched-fifo = ["axtask/sched-fifo"]
sched-rr = ["axtask/sched-rr", "irq"]
sched-cfs = ["axtask/sched-cfs", "irq"]

# File system
fs = [
    "alloc",
    "paging",
    "ax-driver/virtio-blk",
    "dep:ax-fs",
    "ax-runtime/fs",
] # TODO: try to remove "paging"
fs-ng = ["fs", "ax-runtime/fs-ng"]
fs-ng-ext4 = ["fs-ng", "ax-fs-ng/ext4"]
fs-ng-fat = ["fs-ng", "ax-fs-ng/fat"]
fs-ng-times = ["fs-ng", "ax-fs-ng/times"]

# Networking
net = ["alloc", "paging", "ax-driver/virtio-net", "dep:ax-net", "ax-runtime/net"]
net-ng = ["net", "irq", "multitask", "ax-runtime/net-ng"]
vsock = ["ax-runtime/vsock"]

# Display
display = [
    "alloc",
    "paging",
    "ax-driver/virtio-gpu",
    "dep:ax-display",
    "ax-runtime/display",
]

# Input
input = [
    "alloc",
    "paging",
    "ax-driver/virtio-input",
    "dep:ax-input",
    "ax-runtime/input",
]

# Real Time Clock (RTC) Driver.
rtc = ["axhal/rtc", "ax-runtime/rtc"]

# Device drivers
bus-mmio = ["ax-driver?/bus-mmio"]
bus-pci = ["ax-driver?/bus-pci"]
driver-ramdisk = ["ax-driver?/ramdisk", "ax-fs?/use-ramdisk"]
driver-sdmmc = ["ax-driver?/sdmmc"]
driver-ixgbe = ["ax-driver?/ixgbe"]
driver-fxmac = ["ax-driver?/fxmac"]                          # fxmac ethernet driver for PhytiumPi
driver-bcm2835-sdhci = ["ax-driver?/bcm2835-sdhci"]
driver-ahci = ["ax-driver?/ahci"]

# Backtrace
dwarf = ["alloc", "axbacktrace/dwarf"]

[dependencies]
axalloc = { workspace = true, optional = true }
axbacktrace.workspace = true
axconfig = { workspace = true, optional = true }
ax-display = { workspace = true, optional = true }
ax-driver = { workspace = true, optional = true }
ax-fs = { workspace = true, optional = true }
ax-fs-ng = { workspace = true, optional = true }
axhal.workspace = true
ax-input = { workspace = true, optional = true }
ax-ipi = { workspace = true, optional = true }
axlog.workspace = true
ax-net = { workspace = true, optional = true }
ax-runtime.workspace = true
ax-sync = { workspace = true, optional = true }
axtask = { workspace = true, optional = true }
kspin = { workspace = true, optional = true }
