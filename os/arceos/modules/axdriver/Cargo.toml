[package]
name = "ax-driver"
version.workspace = true
edition.workspace = true
authors = [
    "Yuekai Jia <equation618@gmail.com>",
    "ChengXiang Qi <kuangjux@outlook.com>",
]
description = "ArceOS device drivers"
license.workspace = true
homepage.workspace = true
repository = "https://github.com/arceos-org/arceos/tree/main/modules/axdriver"

[features]
bus-mmio = []
bus-pci = ["dep:axdriver_pci", "dep:ax-hal", "dep:ax-config"]
net = ["dep:axdriver_net"]
block = ["dep:ax-driver-block"]
display = ["dep:ax-driver-display"]
input = ["dep:axdriver_input"]
vsock = ["axdriver_vsock"]

# Enabled by features `virtio-*`
virtio = ["dep:ax-driver-virtio", "dep:ax-alloc", "dep:ax-hal", "dep:ax-config"]

# various types of drivers
virtio-blk = ["block", "virtio", "ax-driver-virtio/block"]
virtio-net = ["net", "virtio", "ax-driver-virtio/net"]
virtio-gpu = ["display", "virtio", "ax-driver-virtio/gpu"]
virtio-input = ["input", "virtio", "ax-driver-virtio/input"]
virtio-socket = ["vsock", "virtio", "ax-driver-virtio/socket"]
ramdisk = ["block", "ax-driver-block/ramdisk"]
bcm2835-sdhci = ["block", "ax-driver-block/bcm2835-sdhci"]
sdmmc = ["block", "ax-driver-block/sdmmc", "dep:ax-hal", "dep:ax-config"]
ahci = ["block", "ax-driver-block/ahci", "dep:ax-hal", "dep:ax-config"]
ixgbe = ["net", "axdriver_net/ixgbe", "dep:ax-alloc", "dep:ax-hal", "dep:ax-dma"]
fxmac = ["net", "axdriver_net/fxmac", "dep:ax-alloc", "dep:ax-hal", "dep:ax-dma"]
# more devices example: e1000 = ["net", "axdriver_net/e1000"]

irq = []
dyn = ["dep:axerrno", "dep:axplat-dyn"]

default = ["bus-pci"]

[dependencies]
ax-alloc = { workspace = true, optional = true }
ax-config = { workspace = true, optional = true }
ax-dma = { workspace = true, optional = true }
axdriver_base.workspace = true
ax-driver-block = { workspace = true, optional = true }
ax-driver-display = { workspace = true, optional = true }
axdriver_input = { workspace = true, optional = true }
axdriver_net = { workspace = true, optional = true }
axdriver_pci = { workspace = true, optional = true }
ax-driver-virtio = { workspace = true, optional = true }
axdriver_vsock = { workspace = true, optional = true }
axerrno = { workspace = true, optional = true }
ax-hal = { workspace = true, optional = true }
cfg-if.workspace = true
crate_interface.workspace = true
log.workspace = true
smallvec = { version = "1.15", features = ["const_generics", "union"] }
axplat-dyn = { workspace = true, optional = true }
