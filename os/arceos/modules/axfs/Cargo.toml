[package]
name = "ax-fs"
version.workspace = true
edition.workspace = true
authors = ["Yuekai Jia <equation618@gmail.com>"]
description = "ArceOS filesystem module"
license.workspace = true
homepage.workspace = true
repository = "https://github.com/arceos-org/arceos/tree/main/modules/axfs"

[features]
default = []
times = []
use-ramdisk = [] # TODO: init ramdisk

[dependencies]
ax-driver = { workspace = true, features = ["block"] }
ax-errno = { workspace = true }
ax-hal = { workspace = true }
ax-fs-devfs = { version = "0.3.2" }
ax-fs-ramfs = { version = "0.3.2" }
ax-fs-vfs = "0.3.2"
ax-io = { workspace = true, features = ["alloc"] }
ax-cap-access = "0.3.0"
ax-lazyinit = "0.4.2"
log = { workspace = true }
rsext4 = "0.3.0"
spin = { workspace = true }

[dependencies.axfatfs]
version = "0.1.0-pre.0"
default-features = false
features = [
  # no std
  "alloc",
  "lfn",
  "log_level_trace",
  "unicode",
]
