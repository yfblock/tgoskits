[package]
name = "ax-hal"
version.workspace = true
edition.workspace = true
authors = ["Yuekai Jia <equation618@gmail.com>"]
description = "ArceOS hardware abstraction layer, provides unified APIs for platform-specific operations"
license.workspace = true
homepage.workspace = true
repository = "https://github.com/arceos-org/arceos/tree/main/modules/axhal"

[features]
smp = [
    "ax-plat-x86-pc?/smp",
    "ax-plat-aarch64-qemu-virt?/smp",
    "ax-plat-riscv64-qemu-virt?/smp",
    "ax-plat-loongarch64-qemu-virt?/smp",
    "axplat-dyn?/smp",
    "ax-plat/smp",
]
irq = [
    "dep:linkme",
    "ax-plat-x86-pc?/irq",
    "ax-plat-aarch64-qemu-virt?/irq",
    "ax-plat-riscv64-qemu-virt?/irq",
    "ax-plat-loongarch64-qemu-virt?/irq",
    "ax-plat/irq",
    "axplat-dyn?/irq",
]
fp-simd = [
    "ax-cpu/fp-simd",
    "ax-plat-x86-pc?/fp-simd",
    "ax-plat-aarch64-qemu-virt?/fp-simd",
    "ax-plat-riscv64-qemu-virt?/fp-simd",
    "ax-plat-loongarch64-qemu-virt?/fp-simd",
]
rtc = [
    "ax-plat-x86-pc?/rtc",
    "ax-plat-aarch64-qemu-virt?/rtc",
    "ax-plat-riscv64-qemu-virt?/rtc",
    "ax-plat-loongarch64-qemu-virt?/rtc",
]
paging = ["dep:ax-alloc", "dep:ax-page-table-multiarch"]
tls = ["ax-cpu/tls"]
uspace = ["paging", "ax-cpu/uspace", "axplat-dyn?/uspace"]
hv = ["paging", "ax-cpu/arm-el2", "ax-percpu/arm-el2", "axplat-dyn?/hv"]

# Custom or default platforms
myplat = []
plat-dyn = ["axplat-dyn"]
defplat = [
    "dep:ax-plat-x86-pc",
    "dep:ax-plat-aarch64-qemu-virt",
    "dep:ax-plat-riscv64-qemu-virt",
    "dep:ax-plat-loongarch64-qemu-virt",
]

default = []
ipi = ["irq"]

[dependencies]
ax-alloc = { workspace = true, optional = true }
ax-config.workspace = true
ax-cpu.workspace = true
ax-plat.workspace = true
cfg-if.workspace = true
fdt-parser = "0.4"
heapless = "0.9"
ax-kernel-guard.workspace = true
linkme = { version = "0.3.33", optional = true }
log.workspace = true
ax-memory-addr.workspace = true
ax-page-table-multiarch = { workspace = true, optional = true }
ax-percpu.workspace = true
spin.workspace = true

[target.'cfg(target_arch = "x86_64")'.dependencies]
ax-plat-x86-pc = { workspace = true, optional = true }

[target.'cfg(target_os = "none")'.dependencies]
axplat-dyn = { workspace = true, optional = true }

[target.'cfg(target_arch = "aarch64")'.dependencies]
ax-plat-aarch64-qemu-virt = { workspace = true, optional = true }

[target.'cfg(target_arch = "riscv64")'.dependencies]
ax-plat-riscv64-qemu-virt = { workspace = true, optional = true }

[target.'cfg(target_arch = "loongarch64")'.dependencies]
ax-plat-loongarch64-qemu-virt = { workspace = true, optional = true }

[build-dependencies]
ax-config.workspace = true
