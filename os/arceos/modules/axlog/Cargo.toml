[package]
name = "ax-log"
version.workspace = true
edition.workspace = true
authors = ["Yuekai Jia <equation618@gmail.com>"]
description = "Macros for multi-level formatted logging used by ArceOS"
license.workspace = true
homepage.workspace = true
repository = "https://github.com/arceos-org/arceos/tree/main/modules/axlog"

[features]
std = ["dep:chrono"]
default = []

[dependencies]
cfg-if.workspace = true
chrono = { workspace = true, default-features = true, optional = true }
ax-crate-interface.workspace = true
ax-kspin.workspace = true
log.workspace = true

[dev-dependencies]
ax-log = { path = ".", features = ["std"] }
