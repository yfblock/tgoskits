[package]
name = "ax-mm"
version = "0.5.11"
repository = "https://github.com/rcore-os/tgoskits"
edition.workspace = true
authors = ["Yuekai Jia <equation618@gmail.com>"]
description = "ArceOS virtual memory management module"
license.workspace = true

[features]
copy = ["ax-page-table-multiarch/copy-from"]

[dependencies]
ax-alloc.workspace = true
ax-errno.workspace = true
ax-hal = { workspace = true, features = ["paging"] }
ax-kspin.workspace = true
ax-lazyinit.workspace = true
log.workspace = true
ax-memory-addr.workspace = true
ax-memory-set = { version = "0.6", features = ["ax-errno"] }
ax-page-table-multiarch = { workspace = true, optional = true }
