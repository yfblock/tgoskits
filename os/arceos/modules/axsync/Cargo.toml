[package]
name = "ax-sync"
version.workspace = true
edition.workspace = true
authors = ["Yuekai Jia <equation618@gmail.com>"]
description = "ArceOS synchronization primitives"
license.workspace = true
homepage.workspace = true
repository = "https://github.com/arceos-org/arceos/tree/main/modules/axsync"

[features]
multitask = ["ax-task/multitask"]
default = []

[dependencies]
ax-task.workspace = true
ax-kspin.workspace = true
lock_api.workspace = true

[dev-dependencies]
ax-sync = { path = ".", features = ["multitask"] }
ax-task = { workspace = true, features = ["test"] }
# FIXME: `rand` crate can not be used since https://github.com/google/zerocopy/pull/2574
fastrand = "2.3"
