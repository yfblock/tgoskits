[package]
name = "axvisor"
authors = ["Keyang Hu <keyang.hu@qq.com>", "周睿 <zrufo747@outlook.com>"]
edition = "2024"
license = "Apache-2.0"
version = "0.5.0"
description = "A lightweight type-1 hypervisor based on ArceOS"
repository = "https://github.com/arceos-hypervisor/axvisor"
homepage = "https://github.com/arceos-hypervisor/axvisor"
documentation = "https://docs.rs/axvisor"
readme = "README.md"
keywords = ["hypervisor", "virtualization", "arceos", "type-1"]
categories = ["os", "no-std", "embedded"]
include = [
    ".cargo/config.toml",
    ".github/*/**",
    "doc/**",
    "src/**",
    "build.rs",
    "configs/**",
    "scripts/**",
    "xtask/src/**",
    "rust-toolchain.toml",
    "README.md",
    "LICENSE*",
]

[profile.release]
lto = true

[[bin]]
name = "axvisor"
path = "src/main.rs"

[[bin]]
name = "xtask"
path = "xtask/src/main.rs"

[features]
default = []
ept-level-4 = []
fs = ["ax-std/fs"]
dyn-plat = ["ax-std/plat-dyn"]
# Driver features (from former driver crate)
rk3588-clk = ["dep:rk3588-clk"]
rk3568-clk = ["dep:rk3568_clk"]
sdmmc = ["dep:sdmmc"]
rockchip-pm = ["dep:rockchip-pm"]
phytium-blk = ["dep:phytium-mci"]

[target.'cfg(not(any(windows, unix)))'.dependencies]
bitflags = "2.2"
cfg-if = "1.0"
ax-cpumask = "0.3.0"
ax-kernel-guard = "0.3.3"
ax-kspin = "0.3.1"
lazy_static = {version = "1.5", default-features = false, features = ["spin_no_std"]}
lazyinit = "0.4.2"
log = "0.4"
spin = "0.10"
timer_list = "0.3.0"
hashbrown = "0.14"

# System dependent modules provided by ArceOS.
ax-std = { version = "0.5.0", features = [
  "alloc-level-1",
  "paging",
  "irq",
  "multitask",
  "task-ext",
  "smp",
  "hv",
]}
ax-hal = { version = "0.5.0", features = ["paging", "irq", "smp", "hv"] }

# System dependent modules provided by ArceOS-Hypervisor (bare-metal only)
axaddrspace = "0.5.0"
axhvc = "0.4.0"
# ax-runtime = { version = "=0.3.0-preview.1", features = ["alloc", "irq", "paging", "smp", "multitask"] }
axvcpu = "0.5.0"
axvm = "0.5.0"
axdevice = "0.4.2"
axdevice_base = "0.4.2"
axvisor_api = "0.5.0"

# System independent crates provided by ArceOS
ax-errno = "0.4.2"
axklib = "0.5.0"
# ax-cpu = { version = "0.3.0-preview.8", features = ["arm-el2"] }
byte-unit = {version = "5", default-features = false, features = ["byte"]}
ax-crate-interface = "0.5.0"
extern-trait = "0.4"
fdt-parser = "0.4"
memory_addr = "0.6.1"
ax-page-table-entry = { version = "0.8.1", features = ["arm-el2"] }
ax-page-table-multiarch = "0.8.1"
ax-percpu = { version = "0.4.3", features = ["arm-el2"] }

rdif-intc = "0.14"
rdif-block = "0.7"
rdif-clk = "0.5"
rdrive = "0.20"
rd-block = "0.1"
pcie = "0.5.0"

# Optional driver dependencies
sdmmc = { version = "0.1", default-features = false, features = ["pio"], optional = true }
rk3588-clk = { version = "0.1", optional = true }
rk3568_clk = { version = "0.1", optional = true }
rockchip-pm = { version = "0.4", optional = true }
phytium-mci = { version = "0.1", default-features = false, features = ["pio"], optional = true }

[target.'cfg(target_arch = "x86_64")'.dependencies]
axplat-x86-qemu-q35 = { version = "0.4.0", default-features = false, features = [
    "reboot-on-system-off",
    "irq",
    "smp",
] }
ax-config = { version = "0.5.0", features = ["plat-dyn"] }

[target.'cfg(target_arch = "aarch64")'.dependencies]
aarch64-cpu-ext = "0.1"
arm-gic-driver = {version = "0.17", features = ["rdif"]}

[target.'cfg(target_arch = "riscv64")'.dependencies]
ax-plat-riscv64-qemu-virt = { path = "platform/riscv64-qemu-virt" }
riscv_vcpu = "0.5.0"
riscv_vplic = "0.4.2"

# xtask dependencies (only used on host platforms)
[target.'cfg(any(windows, unix))'.dependencies]
anyhow.workspace = true
axbuild = "0.4.0"
clap = { version = "4.6", features = ["derive"] }
tokio = { version = "1", features = ["full"] }

[build-dependencies]
ax-config = "0.5.0"
prettyplease = "0.2"
quote = "1.0"
syn = "2.0"
toml = "0.9"
anyhow = "1.0"
