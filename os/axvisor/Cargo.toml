[package]
name = "axvisor"
authors = ["Keyang Hu <keyang.hu@qq.com>", "周睿 <zrufo747@outlook.com>"]
edition = "2024"
license = "Apache-2.0"
version = "0.3.0-preview.2"
description = "A lightweight type-1 hypervisor based on ArceOS"
repository = "https://github.com/arceos-hypervisor/axvisor"
homepage = "https://github.com/arceos-hypervisor/axvisor"
documentation = "https://docs.rs/axvisor"
readme = "README.md"
keywords = ["hypervisor", "virtualization", "arceos", "type-1"]
categories = ["os", "no-std", "embedded"]
include = [
    ".cargo/config.toml",
    ".github/*/**",
    "doc/**",
    "src/**",
    "build.rs",
    "configs/**",
    "scripts/**",
    "xtask/src/**",
    "rust-toolchain.toml",
    "README.md",
    "LICENSE*",
]

[profile.release]
lto = true

[[bin]]
name = "xtask"
path = "xtask/src/main.rs"
required-features = ["xtask"]

[features]
default = []
ept-level-4 = []
fs = ["axstd/fs"]
dyn-plat = ["axstd/plat-dyn"]
# Driver features (from former driver crate)
rk3588-clk = ["dep:rk3588-clk"]
sdmmc = ["dep:sdmmc"]
rockchip-pm = ["dep:rockchip-pm"]
phytium-blk = ["dep:phytium-mci"]
xtask = [
    "dep:anyhow",
    "dep:axvmconfig",
    "dep:cargo_metadata",
    "dep:chrono",
    "dep:clap",
    "dep:colored",
    "dep:flate2",
    "dep:jkconfig",
    "dep:ostool",
    "dep:regex",
    "dep:reqwest",
    "dep:schemars",
    "dep:serde",
    "dep:serde_json",
    "dep:sha2",
    "dep:tar",
    "dep:tokio",
    "dep:toml",
]

[target.'cfg(not(any(windows, unix)))'.dependencies]
bitflags = "2.2"
cfg-if = "1.0"
cpumask = "0.1.0"
kernel_guard = "0.1"
kspin = "0.1"
lazy_static = {version = "1.5", default-features = false, features = ["spin_no_std"]}
lazyinit = "0.2"
log = "0.4"
spin = "0.10"
timer_list = "0.1.0"
hashbrown = "0.14"

# System dependent modules provided by ArceOS.
axstd = { version = "=0.3.0-preview.3", features = [
  "alloc-level-1",
  "paging",
  "irq",
  "multitask",
  "task-ext",
  "smp",
  "hv",
]}

# System dependent modules provided by ArceOS-Hypervisor (bare-metal only)
axaddrspace = "0.3.0"
axhvc = "0.2.0"
# axruntime = { version = "=0.3.0-preview.1", features = ["alloc", "irq", "paging", "smp", "multitask"] }
axvcpu = "0.3.0"
axvm = "0.3.0"
axdevice = "0.2.2"
axdevice_base = "0.2.2"
axvisor_api = "0.3.0"

# System independent crates provided by ArceOS
axerrno = "0.2.2"
axklib = "0.3.0"
# axcpu = { version = "0.3.0-preview.8", features = ["arm-el2"] }
byte-unit = {version = "5", default-features = false, features = ["byte"]}
crate_interface = "0.3"
extern-trait = "0.4"
fdt-parser = "0.4"
memory_addr = "0.4.1"
page_table_entry = { version = "0.6", features = ["arm-el2"] }
page_table_multiarch = "0.6"
percpu = { version = "0.2.3-preview.1", features = ["arm-el2"] }

rdif-intc = "0.14"
rdif-block = "0.7"
rdif-clk = "0.5"
rdrive = "0.20"
rd-block = "0.1"
pcie = "0.5.0"

# Optional driver dependencies
sdmmc = { version = "0.1", default-features = false, features = ["pio"], optional = true }
rk3588-clk = { version = "0.1", optional = true }
rockchip-pm = { version = "0.4", optional = true }
phytium-mci = { version = "0.1", default-features = false, features = ["pio"], optional = true }

[target.'cfg(target_arch = "x86_64")'.dependencies]
axplat-x86-qemu-q35 = { version = "0.2.0", default-features = false, features = [
    "reboot-on-system-off",
    "irq",
    "smp",
] }
axconfig = { version = "=0.3.0-preview.3", features = ["plat-dyn"] }

[target.'cfg(target_arch = "aarch64")'.dependencies]
aarch64-cpu-ext = "0.1"
arm-gic-driver = {version = "0.17", features = ["rdif"]}

[target.'cfg(target_arch = "riscv64")'.dependencies]
axplat-riscv64-qemu-virt = "0.3.1-pre.6"

# xtask dependencies (only used when xtask feature is enabled)
[target.'cfg(any(windows, unix))'.dependencies]
anyhow = { version = "1.0", optional = true }
cargo_metadata = { version = "0.23", optional = true }
chrono = { version = "0.4", features = ["serde"], optional = true }
clap = {version = "4.4", features = ["derive"], optional = true }
colored = { version = "3", optional = true }
flate2 = { version = "1.0", optional = true }
jkconfig = { version = "0.1", optional = true }
ostool = { version = "0.8.4", optional = true }
regex = { version = "1.12", optional = true }
reqwest = { version = "0.13", optional = true }
schemars = {version = "1", features = ["derive"], optional = true }
serde = {version = "1.0", features = ["derive"], optional = true }
serde_json = { version = "1", optional = true }
sha2 = { version = "0.10", optional = true }
tar = { version = "0.4", optional = true }
tokio = {version = "1", features = ["full"], optional = true }
toml = { version = "0.9", optional = true }

axvmconfig = { version = "0.2.2", features = ["std"], optional = true }

[build-dependencies]
axconfig = "=0.3.0-preview.3"
prettyplease = "0.2"
quote = "1.0"
syn = "2.0"
toml = "0.9"
anyhow = "1.0"
