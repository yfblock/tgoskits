# Vm base info configs
#
[base]
# Guest vm id.
id = 1
# Guest vm name.
name = "zephyr-phytiumpi"
# Virtualization type.
vm_type = 1
# The number of virtual CPUs.
cpu_num = 1
# The physical CPU ids.
phys_cpu_ids = [0x00]

#
# Vm kernel configs
#
[kernel]
# IMPORTANT:
#   Build a dedicated Zephyr image for the AxVisor guest RAM window on Phytium Pi.
#   The stock e2000q_demo image links SRAM at 0x8010_0000, but AxVisor exposes
#   guest RAM at 0x20_2000_0000 on this platform.
#   Please rebuild Zephyr with SRAM base relocated into the guest memory region,
#   then update `entry_point` to match `readelf -h zephyr.elf`.

# The entry point of the guest kernel image.
# Current build from /code/rtos/zephyr yields ELF entry 0x20_2000_29e4.
entry_point = 0x20_2000_29e4
# The location of image: "memory" | "fs".
# Load from file system.
image_location = "memory"
# The load address of the kernel image.
kernel_load_addr = 0x20_2000_0000
# The file path of the kernel image.
kernel_path = "/path/to/zephyr-phytiumpi.bin"
# The file path of the device tree blob (DTB).
#dtb_path = "/code/rtos/tgoskits/os/axvisor/configs/vms/zephyr-aarch64-e2000-smp1.dtb"
# The load address of the device tree blob (DTB).
dtb_load_addr = 0x20_2000_0000

# Memory regions with format (`base_paddr`, `size`, `flags`, `map_type`).
# For `map_type`, 0 means `MAP_ALLOC`, 1 means `MAP_IDENTICAL`.
memory_regions = [
    [0x20_2000_0000, 0x2000_0000, 0x7, 1], # System RAM MAP_IDENTICAL
]

#
# Device specifications
#
[devices]
# The interrupt mode.
interrupt_mode = "passthrough"

# Emu_devices.
# Name Base-Ipa Ipa_len Alloc-Irq Emu-Type EmuConfig.
emu_devices = []

# Pass-through devices.
# Name Base-Ipa Base-Pa Length Alloc-Irq.
passthrough_devices = [
    ["/"],
    #["/timer"],
]

# Passthrough addresses.
# Base-GPA  Length.
passthrough_addresses = [
    #[0x28041000, 0x100_0000]
]

# Devices that are not desired to be passed through to the guest
excluded_devices = [
   # ["/gic-v3"],
]
