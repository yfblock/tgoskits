# Vm base info configs
#
[base]
# Guest vm id.
id = 1
# Guest vm name.
name = "zephyr"
# Virtualization type.
vm_type = 1
# The number of virtual CPUs.
cpu_num = 4
# The physical CPU ids.
phys_cpu_ids = [0x00, 0x100, 0x200, 0x300]

#
# Vm kernel configs
#
[kernel]
# The entry point of the kernel image.
entry_point = 0x4000_1084
# The location of image: "memory" | "fs".
# Load from memory.
image_location = "memory"
# The load address of the kernel image.
kernel_load_addr = 0x4000_0000
# The file path of the kernel image.
kernel_path = "/path/to/zephyr.bin"

# The file path of the device tree blob (DTB)
#dtb_path = "/code/rtos/tgoskits/os/axvisor/configs/vms/zephyr-aarch64-e2000-smp1.dtb"
# The load address of the device tree blob (DTB).
dtb_load_addr = 0x6000_0000

# Memory regions with format (`base_paddr`, `size`, `flags`, `map_type`).
# For `map_type`, 0 means `MAP_ALLOC`, 1 means `MAP_IDENTICAL`.
memory_regions = [
    [0x4000_0000, 0x3000_0000, 0x7, 2], # System RAM 512MB MAP_IDENTICAL
]

#
# Device specifications
#
[devices]
# The interrupt mode.
interrupt_mode = "passthrough"
# Emu_devices.
# Name Base-Ipa Ipa_len Alloc-Irq Emu-Type EmuConfig.
emu_devices = []

# Pass-through devices.
# Name Base-Ipa Base-Pa Length Alloc-Irq.
passthrough_devices = [
    ["/"],
]

# Passthrough addresses.
# Base-GPA  Length.
passthrough_addresses = []

# Devices that are not desired to be passed through to the guest
excluded_devices = []
