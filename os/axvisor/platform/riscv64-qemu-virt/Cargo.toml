[package]
edition = "2024"
name = "ax-plat-riscv64-qemu-virt"
version = "0.5.0"

[features]
default = [
  "irq",
  "smp",
]
fp-simd = ["ax-cpu/fp-simd"]
irq = ["ax-plat/irq"]
rtc = ["riscv_goldfish"]
smp = ["ax-plat/smp"]

[dependencies]
ax-kspin = "0.3.1"
ax-lazyinit = "0.4.2"
log = "0.4"
riscv = "0.14.0"
riscv_goldfish = { version = "0.1", optional = true }
ax-riscv-plic = "0.4.0"
sbi-rt = { version = "0.0.3", features = ["legacy"] }
uart_16550 = "0.4.0"

ax-config-macros = "0.4.1"
ax-cpu = { workspace = true }
ax-plat = { workspace = true }
axvisor_api = "0.5.0"
ax-crate-interface = { workspace = true }

[package.metadata.docs.rs]
targets = ["riscv64gc-unknown-none-elf"]
