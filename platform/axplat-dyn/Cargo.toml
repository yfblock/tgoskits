[package]
name = "axplat-dyn"
version.workspace = true
authors = ["周睿 <zrufo747@outlook.com>"]
categories.workspace = true
description = "A dynamic platform module for ArceOS, providing runtime platform detection and configuration"
edition.workspace = true
keywords.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = ["smp", "irq"]
smp = ["ax-plat/smp"]
irq = ["ax-plat/irq"]
uspace = ["somehal/uspace"]
hv = ["somehal/hv", "ax-cpu/arm-el2"]

[dependencies]
anyhow = { version = "1", default-features = false }
ax-alloc.workspace = true
ax-config-macros = "0.4.1"
ax-cpu.workspace = true
ax-driver-base.workspace = true
ax-driver-block.workspace = true
ax-driver-virtio = { workspace = true, features = ["block"] }
ax-errno.workspace = true
axklib.workspace = true
ax-plat.workspace = true
dma-api = "0.7"
fdt-edit = "0.2"
heapless = "0.9"
log.workspace = true
ax-memory-addr.workspace = true
ax-percpu = { workspace = true, features = ["custom-base"] }
rd-block = "0.1"
rdrive = "0.20"
somehal = "0.6"
spin = "0.10"
