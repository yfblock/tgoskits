[package]
name = "axplat-x86-qemu-q35"
version = "0.4.0"
edition = "2024"
authors = ["The Axvisor Team"]
description = "Hardware platform implementation for x86_64 QEMU Q35 chipset, supporting multiboot boot protocol"
license = "Apache-2.0"
repository = "https://github.com/arceos-hypervisor/x86-qemu-q35"
keywords = ["axvisor", "x86", "qemu", "q35", "hypervisor"]
categories = ["embedded", "hardware-support", "no-std", "os"]
readme = "README.md"
exclude = [".github", ".gitignore"]

[features]
default = [
  "irq",
  "smp",
  "reboot-on-system-off",
]
fp-simd = []
irq = ["ax-plat/irq"]
reboot-on-system-off = []
rtc = ["dep:x86_rtc"]
smp = ["ax-plat/smp", "ax-kspin/smp"]

[dependencies]
ax-config-macros = "0.4.1"
ax-cpu = { workspace = true, features = ["arm-el2"] }
ax-plat.workspace = true
bitflags = "2.6"
heapless = "0.9"
ax-int-ratio = "0.3.2"
ax-kspin = "0.3.1"
ax-lazyinit = "0.4.2"
log = "0.4"
ax-percpu.workspace = true

multiboot = "0.8"
raw-cpuid = "11.5"
uart_16550 = "0.4"
x2apic = "0.5"
x86 = "0.52"
x86_64 = "0.15.2"
x86_rtc = {version = "0.1", optional = true}

[package.metadata.docs.rs]
targets = ["x86_64-unknown-none"]
