[package]
name = "arceos-fs-shell"
version = "0.3.0"
edition.workspace = true
authors = ["Yuekai Jia <equation618@gmail.com>"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[features]
use-ramfs = ["dep:ax-fs-vfs", "dep:ax-fs-ramfs", "dep:ax-crate-interface"]
default = []

[dependencies]
ax-fs-vfs = { version = "0.3.2", optional = true }
ax-fs-ramfs = { version = "0.3.2", optional = true }
ax-crate-interface = { version = "0.5.0", optional = true }
ax-std = { workspace = true, features = ["alloc", "fs"], optional = true }
