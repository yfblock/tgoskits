[package]
name = "arceos-affinity"
version = "0.3.1"
edition.workspace = true
authors = ["Keyang Hu <keyang.hu@qq.com>"]
description = "A simple demo to test the cpu affinity of tasks under ArceOS"
publish = false

[features]
sched-rr = ["ax-std?/sched-rr"]
sched-cfs = ["ax-std?/sched-cfs"]

[dependencies]
ax-std = { workspace = true, features = ["multitask"], optional = true }
